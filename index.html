<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard MCNS | Ecosistema Integral V11.6</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #eef2f5; margin: 0; padding: 20px; }
        .header { background: white; padding: 20px; border-radius: 10px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-bottom: 20px; }
        .kpi-card { background: white; padding: 20px; border-radius: 10px; border-left: 5px solid #ccc; }
        .dashboard-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .panel { background: white; padding: 20px; border-radius: 10px; }
        .contenedor-grafico-principal { height: 400px; width: 100%; }
        .contenedor-grafico-secundario { height: 300px; width: 100%; }
        h2.seccion-titulo { margin: 40px 0 20px 0; border-top: 2px solid #ddd; padding-top: 20px; text-align: center; }
    </style>
</head>
<body>
    <div class="header">
        <h2>📊 Ecosistema Integral MCNS | V11.6</h2>
        <div class="filtros-multiples">
            <label><input type="checkbox" id="chkComentadas" checked onchange="procesarDatos()"> Visitas Comentadas</label>
            <label><input type="checkbox" id="chkLibres" checked onchange="procesarDatos()"> Recorridos Libres</label>
        </div>
    </div>

    <div class="kpi-grid">
        <div class="kpi-card border-comentadas"><h4>Total Visitas Comentadas</h4><div class="kpi-valor" id="kpiComentadas">0</div></div>
        <div class="kpi-card border-libres"><h4>Total Recorridos Libres</h4><div class="kpi-valor" id="kpiLibres">0</div></div>
    </div>

    <div class="panel" style="margin-bottom: 20px;">
        <h3>EVOLUCIÓN MENSUAL COMPARATIVA</h3>
        <div class="contenedor-grafico-principal"><canvas id="chartAsistentes"></canvas></div>
    </div>

    <div id="bloqueModuloComentadas">
        <h2 class="seccion-titulo">🗣️ Módulo 1: Visitas Comentadas</h2>
        <div class="dashboard-grid">
            <div class="panel"><h3>GRUPOS</h3><canvas id="chartGrupos"></canvas></div>
            <div class="panel"><h3>EDAD</h3><canvas id="chartEdad"></canvas></div>
            <div class="panel"><h3>GÉNERO</h3><canvas id="chartGenero"></canvas></div>
            <div class="panel"><h3>DESCRIPTOR</h3><canvas id="chartDescriptor"></canvas></div>
        </div>
    </div>

    <div id="bloqueModuloLibres">
        <h2 class="seccion-titulo">🚶 Módulo 2: Recorridos Libres</h2>
        <div class="dashboard-grid">
            <div class="panel"><h3>VINCULACIÓN</h3><canvas id="chartVinculacion"></canvas></div>
            <div class="panel"><h3>PROCEDENCIA</h3><canvas id="chartProcedencia"></canvas></div>
        </div>
    </div>

    <script>
        const urlComentadas = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vS7f26O3sj6abtatPWdf3wa4hdGxMI5gjOZU--SYrJ92jTxZ9Ch6LrTESm_XjWeIRFTrnKJq-c2aed9/pub?output=csv';
        const urlLibres = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSx-9TxdT25K0DSLKTO4YMhWsH0aXkRvMn1Smzj42pfjwEmYgdkhvJyrDQKkxAI8Q/pub?output=csv';
        
        let datosC=[], datosL=[];
        async function init() {
            const [r1, r2] = await Promise.all([fetch(urlComentadas).then(r=>r.text()), fetch(urlLibres).then(r=>r.text())]);
            datosC = Papa.parse(r1, {header:true, dynamicTyping:true}).data.filter(d=>d.MES);
            datosL = Papa.parse(r2, {header:true, dynamicTyping:true}).data.filter(d=>d.MES);
            procesarDatos();
        }

        function procesarDatos() {
            const meses = ['enero', 'febrero', 'marzo', 'abril', 'mayo', 'junio', 'julio', 'agosto', 'septiembre', 'octubre', 'noviembre', 'diciembre'];
            const act = { c: document.getElementById('chkComentadas').checked, l: document.getElementById('chkLibres').checked };
            
            // Cálculos
            let dataC = meses.map(m => datosC.filter(d=>String(d.MES).toLowerCase().includes(m)).reduce((s,d)=>s+(parseInt(d['NÚMERO TOTAL DE PERSONAS ASISTENTES'])||0), 0));
            let dataL = meses.map(m => datosL.filter(d=>String(d.MES).toLowerCase().includes(m)).reduce((s,d)=>s+(parseInt(d['CANTIDAD DE VISITAS'])||0), 0));
            
            // Gráfico Principal
            new Chart(document.getElementById('chartAsistentes'), {
                type: 'bar',
                data: { labels: meses, datasets: [
                    act.c ? {label:'Visitas Comentadas', data: dataC, backgroundColor:'#2980b9'} : null,
                    act.l ? {label:'Recorridos Libres', data: dataL, backgroundColor:'#e67c73'} : null
                ].filter(d=>d) },
                options: { responsive:true, maintainAspectRatio:false }
            });

            // KPIs
            document.getElementById('kpiComentadas').innerText = dataC.reduce((a,b)=>a+b, 0).toLocaleString();
            document.getElementById('kpiLibres').innerText = dataL.reduce((a,b)=>a+b, 0).toLocaleString();
            
            // Mostrar/Ocultar Módulos
            document.getElementById('bloqueModuloComentadas').style.display = act.c ? 'block' : 'none';
            document.getElementById('bloqueModuloLibres').style.display = act.l ? 'block' : 'none';
        }
        init();
    </script>
</body>
</html>
