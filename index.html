<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard MCNS | Analítica Avanzada</title>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #eef2f5; color: #333; margin: 0; padding: 20px;
        }
        .header {
            display: flex; justify-content: space-between; align-items: center;
            background: white; padding: 20px; border-radius: 10px; margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .controles select {
            padding: 10px; font-size: 16px; border-radius: 5px; border: 1px solid #ccc; cursor: pointer;
        }
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 20px;
        }
        .panel {
            background: white; padding: 20px; border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        
        /* Contenedor principal con Proporción Áurea (Aprox 16:10 / 1.618) y altura máxima controlada */
        .panel-principal { 
            grid-column: 1 / -1; 
            display: flex; flex-direction: column; align-items: center;
        }
        .contenedor-grafico-principal {
            position: relative;
            width: 100%;
            max-width: 1000px;
            height: 450px; /* Evita que crezca desproporcionadamente */
        }
        .contenedor-grafico-secundario {
            position: relative;
            width: 100%;
            height: 300px;
        }

        h3 { text-align: center; color: #2c3e50; font-size: 1.1em; margin-top: 0; }
        .instruccion { text-align: center; font-size: 0.85em; color: #7f8c8d; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div class="header">
        <h2>📊 Estadísticas del Museo MCNS</h2>
        <div class="controles">
            <label for="selectorAnio"><strong>Filtrar por Año: </strong></label>
            <select id="selectorAnio" onchange="procesarDatos()">
                <option value="TODOS">Todos los años comparados</option>
            </select>
            <button onclick="resetearFiltroMes()" style="padding: 10px; margin-left:10px; cursor:pointer; background:#e74c3c; color:white; border:none; border-radius:5px; font-weight:bold;">Quitar filtro de Mes</button>
        </div>
    </div>

    <div class="dashboard-grid">
        <div class="panel panel-principal">
            <h3>NÚMERO TOTAL DE PERSONAS ASISTENTES (Por Mes)</h3>
            <p class="instruccion">👆 Haz clic en una barra para filtrar los paneles inferiores por ese mes</p>
            <div class="contenedor-grafico-principal">
                <canvas id="chartAsistentes"></canvas>
            </div>
        </div>

        <div class="panel">
            <h3>GRUPOS POR INSTITUCIÓN</h3>
            <div class="contenedor-grafico-secundario">
                <canvas id="chartGrupos"></canvas>
            </div>
        </div>

        <div class="panel">
            <h3>ASISTENTES POR EDAD</h3>
            <div class="contenedor-grafico-secundario">
                <canvas id="chartEdad"></canvas>
            </div>
        </div>

        <div class="panel">
            <h3>PROPORCIÓN DE GÉNERO (M vs F)</h3>
            <div class="contenedor-grafico-secundario">
                <canvas id="chartGenero"></canvas>
            </div>
        </div>
    </div>

    <script>
        // Registrar el plugin de etiquetas globales
        Chart.register(ChartDataLabels);

        // Configuración global para que los números no se amontonen
        Chart.defaults.set('plugins.datalabels', {
            color: '#2c3e50',
            anchor: 'end',
            align: 'top',
            font: { weight: 'bold', size: 10 },
            formatter: (value) => { return value > 0 ? value : ''; } // Oculta los ceros
        });

        const urlCSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vS7f26O3sj6abtatPWdf3wa4hdGxMI5gjOZU--SYrJ92jTxZ9Ch6LrTESm_XjWeIRFTrnKJq-c2aed9/pub?output=csv';

        let datosGlobales = [];
        let aniosDetectados = new Set();
        let mesSeleccionado = null; 
        
        let graficos = { asistentes: null, grupos: null, edad: null, genero: null };
        const mesesOrden = ['enero', 'febrero', 'marzo', 'abril', 'mayo', 'junio', 'julio', 'agosto', 'septiembre', 'octubre', 'noviembre', 'diciembre'];
        
        // Gradiente de azules para los distintos años
        const paletaAzules = ['#08306b', '#2171b5', '#6baed6', '#bdd7e7', '#eff3ff'];

        Papa.parse(urlCSV, {
            download: true, header: true, dynamicTyping: true,
            complete: function(resultados) {
                datosGlobales = resultados.data.map(fila => {
                    let mesLimpio = "Desconocido";
                    let anioStr = "Desconocido";

                    if (fila['MES']) mesLimpio = String(fila['MES']).toLowerCase().split('-')[0].trim();
                    if (fila['FECHA']) {
                        let match = String(fila['FECHA']).match(/\d{4}/);
                        if (match) {
                            anioStr = match[0];
                            aniosDetectados.add(anioStr);
                        }
                    }

                    // Limpieza estricta para M y F buscando la clave exacta en caso de que tenga espacios
                    let mVal = 0; let fVal = 0;
                    for (let key in fila) {
                        if (key.trim() === 'M') mVal = parseInt(fila[key]) || 0;
                        if (key.trim() === 'F') fVal = parseInt(fila[key]) || 0;
                    }

                    return {
                        MES_LIMPIO: mesLimpio,
                        ANIO: anioStr,
                        ASISTENTES: parseInt(fila['NÚMERO TOTAL DE PERSONAS ASISTENTES']) || 0,
                        GRUPOS: parseInt(fila['NÚMERO DE GRUPOS POR INSTITUCIÓN U ORGANIZACIÓN COMUNITARIA']) || 0,
                        M: mVal,
                        F: fVal,
                        EDAD: fila['RANGO DE EDAD'] ? String(fila['RANGO DE EDAD']).trim() : 'Sin clasificar'
                    };
                }).filter(d => d.ASISTENTES > 0 || d.GRUPOS > 0 || d.M > 0 || d.F > 0);

                llenarSelectorAnios();
                procesarDatos(); 
            }
        });

        function llenarSelectorAnios() {
            const selector = document.getElementById('selectorAnio');
            Array.from(aniosDetectados).sort().forEach(anio => {
                let opcion = document.createElement('option');
                opcion.value = anio; opcion.text = "Año " + anio;
                selector.appendChild(opcion);
            });
        }

        function procesarDatos() {
            const anioElegido = document.getElementById('selectorAnio').value;
            let datosFiltradosPorAnio = (anioElegido === "TODOS") ? datosGlobales : datosGlobales.filter(d => d.ANIO === anioElegido);

            // 1. LÓGICA DEL PANEL PRINCIPAL (Barras agrupadas vs Barra única)
            let datasetsPrincipal = [];

            if (anioElegido === "TODOS") {
                // Modo comparativo: Un color/dataset por año
                let anios = Array.from(aniosDetectados).sort();
                anios.forEach((anio, index) => {
                    let datosAnioMes = mesesOrden.map(m => {
                        return datosGlobales.filter(d => d.ANIO === anio && d.MES_LIMPIO === m)
                                            .reduce((sum, d) => sum + d.ASISTENTES, 0);
                    });
                    datasetsPrincipal.push({
                        label: 'Asistentes ' + anio,
                        data: datosAnioMes,
                        backgroundColor: paletaAzules[index % paletaAzules.length],
                        borderRadius: 4
                    });
                });
            } else {
                // Modo único: Muestra el año elegido e indica si hay un mes seleccionado
                let datosMes = mesesOrden.map(m => {
                    return datosFiltradosPorAnio.filter(d => d.MES_LIMPIO === m)
                                                .reduce((sum, d) => sum + d.ASISTENTES, 0);
                });
                let coloresMeses = mesesOrden.map(m => (mesSeleccionado === null || mesSeleccionado === m) ? '#3498db' : '#bdc3c7');
                datasetsPrincipal.push({
                    label: 'Asistentes ' + anioElegido,
                    data: datosMes,
                    backgroundColor: coloresMeses,
                    borderRadius: 4
                });
            }

            actualizarGraficoAvanzado('asistentes', 'chartAsistentes', 'bar', mesesOrden, datasetsPrincipal);

            // 2. LÓGICA DE LOS PANELES INFERIORES (Cross-filtering)
            let datosSecundarios = datosFiltradosPorAnio;
            if (mesSeleccionado) {
                datosSecundarios = datosFiltradosPorAnio.filter(d => d.MES_LIMPIO === mesSeleccionado);
            }

            // Grupos (Sumatoria por mes para el periodo/mes filtrado)
            let datosGruposMes = mesesOrden.map(m => {
                return datosSecundarios.filter(d => d.MES_LIMPIO === m).reduce((sum, d) => sum + d.GRUPOS, 0);
            });
            actualizarGraficoBasico('grupos', 'chartGrupos', 'bar', mesesOrden, datosGruposMes, '#2ecc71', 'Grupos');

            // Edad
            let edadesMap = {};
            datosSecundarios.forEach(d => {
                if (d.EDAD !== 'Sin clasificar') edadesMap[d.EDAD] = (edadesMap[d.EDAD] || 0) + d.ASISTENTES;
            });
            actualizarGraficoBasico('edad', 'chartEdad', 'bar', Object.keys(edadesMap), Object.values(edadesMap), '#9b59b6', 'Asistentes');

            // Género
            let totalM = 0; let totalF = 0;
            datosSecundarios.forEach(d => { totalM += d.M; totalF += d.F; });
            
            // Renderizamos pastel si hay datos, o borramos si no hay
            actualizarGraficoPie('genero', 'chartGenero', ['Masculino (M)', 'Femenino (F)'], [totalM, totalF], ['#34495e', '#e74c3c']);
        }

        // MOTOR DE DIBUJO PARA CHART.JS
        function actualizarGraficoAvanzado(idGrafico, idCanvas, tipo, etiquetas, configDatasets) {
            const ctx = document.getElementById(idCanvas).getContext('2d');
            if (graficos[idGrafico]) {
                graficos[idGrafico].data.labels = etiquetas;
                graficos[idGrafico].data.datasets = configDatasets;
                graficos[idGrafico].update();
            } else {
                graficos[idGrafico] = new Chart(ctx, {
                    type: tipo,
                    data: { labels: etiquetas, datasets: configDatasets },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false, // Fundamental para respetar el CSS
                        layout: { padding: { top: 20 } }, // Espacio para los números
                        onClick: (evt, elementos) => {
                            if (elementos.length > 0) {
                                const indice = elementos[0].index;
                                mesSeleccionado = etiquetas[indice];
                                procesarDatos();
                            }
                        }
                    }
                });
            }
        }

        function actualizarGraficoBasico(idGrafico, idCanvas, tipo, etiquetas, valores, colores, labelDataset) {
            actualizarGraficoAvanzado(idGrafico, idCanvas, tipo, etiquetas, [{
                label: labelDataset, data: valores, backgroundColor: colores, borderRadius: 4
            }]);
        }

        function actualizarGraficoPie(idGrafico, idCanvas, etiquetas, valores, colores) {
            const ctx = document.getElementById(idCanvas).getContext('2d');
            
            // Si todo está en 0, no dibujamos el pastel para no mostrar error
            if (valores[0] === 0 && valores[1] === 0) valores = [];

            if (graficos[idGrafico]) {
                graficos[idGrafico].data.datasets[0].data = valores;
                graficos[idGrafico].update();
            } else {
                graficos[idGrafico] = new Chart(ctx, {
                    type: 'doughnut',
                    data: { labels: etiquetas, datasets: [{ data: valores, backgroundColor: colores }] },
                    options: { 
                        responsive: true, 
                        maintainAspectRatio: false,
                        plugins: { datalabels: { color: '#fff', font: { size: 14 } } }
                    }
                });
            }
        }

        function resetearFiltroMes() {
            mesSeleccionado = null;
            procesarDatos();
        }
    </script>
</body>
</html>
